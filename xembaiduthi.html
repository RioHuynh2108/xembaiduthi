<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bài Dự Thi</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;

      /* FIX nền full màn hình */
      background-image: url('anhnen1.png');
      background-size: cover;          /* QUAN TRỌNG */
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;    /* giữ nền khi scroll */

      min-height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: flex-end;  /* đẩy menu xuống dưới */
      align-items: center;
    }

    .menu-vertical {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      background-color: transparent;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .menu-vertical button {
      width: 60px;
      height: 40px;
      font-size: 0.8rem;
      background-color: #FFD700;
      color: #8B0000;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }

    .menu-vertical button:hover {
      transform: scale(1.1);
      background-color: #ffe45e;
    }

    .content {
      display: none;
      background: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
      max-width: 90%;
      margin: 10px auto;
      color: white;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body {
        background-size: contain;   /* đảm bảo full màn */
        background-position: center;
      }

      .menu-vertical {
        gap: 10px;
        margin-bottom: 30px;
      }

      .menu-vertical button {
        width: 70px;
        height: 40px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="menu-vertical">
    <button onclick="moQuyen1()">Quyển 1</button>
     <button onclick="moQuyen2()">Quyển 2</button>
     <button onclick="moQuyen3()">Quyển 3</button>
  </div>
  <script>
    function moQuyen1() {
      window.open('https://drive.google.com/file/d/1Ja9H357DRP2tj7GdE0m6bn5hHohU1EOz/view?usp=drive_link', '_blank');
    }

    function showContent(id) {
      const contents = document.querySelectorAll('.content');
      contents.forEach(c => c.style.display = 'none');
      document.getElementById(id).style.display = 'block';
    }
  </script>

    <script>
    function moQuyen2() {
      window.open('https://drive.google.com/file/d/1VqBZULeApiJhZe689yeTPWhOzBoqWL4g/view?usp=drive_link', '_blank');
    }

    function showContent(id) {
      const contents = document.querySelectorAll('.content');
      contents.forEach(c => c.style.display = 'none');
      document.getElementById(id).style.display = 'block';
    }
  </script>

    <script>
    function moQuyen3() {
      window.open('https://drive.google.com/file/d/1u2jCscEXWO_5PD4IaIkgjErfNc9lQJJD/view?usp=drive_link', '_blank');

    }
  </script>

    
</body>
</html>
